<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Web Novel TTS{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-brand">Novel TTS</a>
    <div class="nav-links">
      <a href="/" class="nav-link{% if request.url.path == '/' %} active{% endif %}">Reader</a>
      <a href="/library" class="nav-link{% if request.url.path == '/library' %} active{% endif %}">Library</a>
      {% if auth_enabled %}
      <a href="/logout" class="nav-link">Logout</a>
      {% endif %}
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <div id="persistent-player" class="persistent-player" style="display:none">
    <div class="pp-info">
      <span class="pp-title" id="pp-title">—</span>
      <span class="pp-progress" id="pp-progress">0:00 / 0:00</span>
    </div>
    <div class="pp-controls">
      <button class="pp-btn pp-btn-icon" id="pp-skip-back" title="−10s">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
          <path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/>
        </svg>
      </button>
      <button class="pp-btn pp-play" id="pp-play">
        <svg class="pp-play-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <polygon points="8,5 19,12 8,19"/>
        </svg>
        <svg class="pp-pause-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <rect x="6" y="5" width="4" height="14" rx="1"/>
          <rect x="14" y="5" width="4" height="14" rx="1"/>
        </svg>
      </button>
      <button class="pp-btn pp-btn-icon" id="pp-skip-fwd" title="+10s">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
          <path d="M18 13c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6v4l5-5-5-5v4c-4.42 0-8 3.58-8 8s3.58 8 8 8 8-3.58 8-8h-2z"/>
        </svg>
      </button>
      <input type="range" id="pp-seek" min="0" max="100" value="0" step="0.1" class="pp-seek" />
      <select id="pp-speed" class="pp-speed" title="Playback speed">
        <option value="0.75">0.75×</option>
        <option value="1" selected>1×</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
        <option value="1.75">1.75×</option>
        <option value="2">2×</option>
      </select>
    </div>
  </div>

  <audio id="main-audio"></audio>

  {% block extra_js %}{% endblock %}
  <script src="/static/app.js"></script>
</body>
</html>
